set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

# Enable automatic renaming
set-option -g automatic-rename on
# Set the format to the basename of the current path
set-option -g automatic-rename-format '#{b:pane_current_path}'

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on

bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# split panes using Alt + h/v. keep current dir
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-h split-window -v -c "#{pane_current_path}"

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Refresh config
bind r source-file ~/.tmux.conf

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind-key a copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# status bar 
set -g status-style "#{?client_prefix,bg=#26233a,,bg=#191724}"

# status bar -- right 
set -g status-right-length 100
set -g status-right '#[fg=#26233a,bg=default]#[fg=#f6c177,bg=#26233a] UK #(TZ="Europe/London" date +"%%I:%%M %%p") #[fg=#f6c177,bg=#26233a]#[fg=#191724,bg=#f6c177] %I:%M %p | %Y-%m-%d '

# status bar -- left
set -g window-status-separator ""
set -g status-left "  cc  "
set -g window-status-format "#[fg=#26233a,bg=#26233a]#[fg=#f6c177,bg=#26233a] #I:#W #[fg=#26233a,bg=#26233a]"
set -g window-status-current-format "#[fg=#26233a,bg=#f6c177]#[fg=#26233a,bg=#f6c177,bold] #I:#W #[fg=#f6c177,bg=#26233a]"
 
bind-key s split-window -h "nvim -c 'luafile ~/.config/nvim/scratch.lua' ~/scratch/notes-$(date +%Y%m%d).md"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# plugins 
# run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell '~/.tmux/plugins/tmux-yank/yank.tmux'
